<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Piedra, Papel o Tijera</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; }
    p { color: #aaa; margin-bottom: 2rem; }
    .botones { display: flex; gap: 1.5rem; }
    .botones form button {
      font-size: 3rem;
      padding: 1rem 1.5rem;
      border: 2px solid #0f3460;
      border-radius: 16px;
      background: #16213e;
      color: white;
      cursor: pointer;
      transition: transform 0.1s, border-color 0.2s;
    }
    .botones form button:hover {
      transform: scale(1.1);
      border-color: #e94560;
    }
    .botones form span {
      display: block;
      text-align: center;
      margin-top: 8px;
      font-size: 0.9rem;
      color: #aaa;
    }
  </style>
</head>
<body>
  <h1>Piedra, Papel o Tijera</h1>
  <p>Elige tu arma</p>

  <div class="botones">
    <form action="/jugar" method="POST">
      <input type="hidden" name="jugador" value="piedra">
      <button type="submit">🪨</button>
      <span>Piedra</span>
    </form>

    <form action="/jugar" method="POST">
      <input type="hidden" name="jugador" value="papel">
      <button type="submit">📄</button>
      <span>Papel</span>
    </form>

    <form action="/jugar" method="POST">
      <input type="hidden" name="jugador" value="tijera">
      <button type="submit">✂️</button>
      <span>Tijera</span>
    </form>
  </div>
</body>
</html>
